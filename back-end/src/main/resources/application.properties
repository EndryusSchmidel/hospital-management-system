spring.application.name=projeto-hospital

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_hospital}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.envers.store_data_at_deletion=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.queries=trace

server.port=${PORT:8080}
